name: Deploy to Netlify

on:
  push:
    branches: [main]
  schedule:
    # 每日北京时间8:00自动构建(UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days_limit:
        description: '限制生成天数(0=全部366天,50=测试用)'
        required: false
        default: '50'
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.0'
          extended: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          pip install --quiet pydantic pydantic-settings diskcache httpx tenacity

      - name: Generate full site content
        run: |
          DAYS_LIMIT="${{ github.event.inputs.days_limit || '50' }}"
          echo "🚀 生成内容: 30地区 × ${DAYS_LIMIT}天 × 20语种"
          python3 scripts/generate_full_site.py --output-dir=site/content --limit-days=${DAYS_LIMIT} 2>&1 | tail -10

      - name: Build with Hugo
        run: |
          cd site
          hugo --minify --baseURL "https://history.ai-term-hub.com/"
        env:
          HUGO_ENV: production

      - name: Build Pagefind Search Index
        run: |
          cd site
          npx pagefind --site public/
        continue-on-error: true

      - name: Verify build output
        run: |
          echo "=== 构建产物统计 ==="
          find site/public -name "*.html" | wc -l
          du -sh site/public/
          echo "=== 文件类型统计 ==="
          find site/public -type f | sed 's|.*\.||' | sort | uniq -c | sort -rn | head -10

      - name: Package site as zip
        run: |
          echo "📦 打包 site/public 为 zip (排除 Pagefind 索引测试)..."
          cd site
          zip -r -q -X ../site-public.zip public/ -x "public/pagefind/*" -x "public/pagefind-ui/*"
          cd ..
          ls -lh site-public.zip
          echo "Zip 大小: $(du -h site-public.zip | cut -f1)"
          echo "Zip 中文件数: $(unzip -l site-public.zip | tail -1 | awk '{print $2}')"

      - name: Deploy to Netlify via Zip API
        run: |
          echo "🚀 通过 Netlify API 上传 zip 部署..."
          DEPLOY_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @site-public.zip \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys?title=Deploy%20$(date%20-u%20+%20%27%25Y-%25m-%25d%20%25H:%25M:%25S%27)")
          echo "API 响应:"
          echo "$DEPLOY_RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Deploy ID: {d.get(\"id\")}'); print(f'State: {d.get(\"state\")}'); print(f'URL: {d.get(\"ssl_url\")}'); print(f'Admin: {d.get(\"admin_url\")}')"
          DEPLOY_ID=$(echo "$DEPLOY_RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))")
          if [ -z "$DEPLOY_ID" ]; then
            echo "❌ 部署失败: 未获取到 deploy ID"
            exit 1
          fi
          echo "Deploy ID: $DEPLOY_ID"
          # 等待部署完成(最多 10 分钟)
          for i in $(seq 1 60); do
            sleep 10
            STATE=$(curl -s -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
              "https://api.netlify.com/api/v1/deploys/$DEPLOY_ID" | \
              python3 -c "import json,sys; print(json.load(sys.stdin).get('state',''))")
            echo "[$i/60] Deploy state: $STATE"
            if [ "$STATE" = "ready" ]; then
              echo "✅ 部署成功!"
              break
            fi
            if [ "$STATE" = "error" ]; then
              echo "❌ 部署失败!"
              exit 1
            fi
          done

      - name: Workflow summary
        if: always()
        run: |
          echo "=== Deploy Workflow 总结 ==="
          echo "触发: ${{ github.event_name }}"
          echo "分支: ${{ github.ref }}"
          echo "提交: ${{ github.sha }}"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ 部署成功 - 访问 https://history.ai-term-hub.com"
          else
            echo "❌ 部署失败"
          fi
