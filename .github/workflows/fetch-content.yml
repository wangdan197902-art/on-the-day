name: Fetch Content Daily

on:
  schedule:
    # 每日北京时间 6:00 (UTC 22:00 前一天)抓取新事件
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      target_dates:
        description: '指定日期(逗号分隔 MM-DD,如 07-04,01-01)。留空则抓取今日'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: fetch-content
  cancel-in-progress: false

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ENV_MODE: cloud
      AGNES_LLM_API_KEY: ${{ secrets.AGNES_LLM_API_KEY }}
      AGNES_LLM_BASE_URL: ${{ secrets.AGNES_LLM_BASE_URL }}
      AGNES_LLM_MODEL: ${{ secrets.AGNES_LLM_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet pydantic pydantic-settings diskcache httpx tenacity python-dotenv

      - name: Determine target dates
        id: dates
        run: |
          TARGET_DATES="${{ github.event.inputs.target_dates }}"
          if [ -z "$TARGET_DATES" ]; then
            # 默认抓取今天(UTC)
            TODAY=$(date -u +'%m-%d')
            TARGET_DATES="$TODAY"
          fi
          echo "dates=$TARGET_DATES" >> $GITHUB_OUTPUT
          echo "目标日期: $TARGET_DATES"

      - name: Run fetch pipeline
        id: fetch
        run: |
          echo "🚀 抓取 ${{ steps.dates.outputs.dates }} 的事件"
          # 注: 使用 set -o pipefail 确保管道中 Python 失败时整个命令失败
          # 不使用 || echo 吞掉错误,让 CI 正确报告失败
          set -o pipefail
          python3 -m src.pipeline.orchestrator --mode=day --month=$(echo ${{ steps.dates.outputs.dates }} | cut -d'-' -f1) --day=$(echo ${{ steps.dates.outputs.dates }} | cut -d'-' -f2) --country=CN --language=zh 2>&1 | tee fetch.log
          echo "=== 抓取日志 ==="
          tail -20 fetch.log

      - name: Commit new fixtures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/fixtures/ site/content/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无新内容需要提交"
            echo "committed=false" >> $GITHUB_ENV
          else
            git commit -m "feat: auto-fetch $(date -u +'%Y-%m-%d') today in history events"
            echo "committed=true" >> $GITHUB_ENV
          fi

      - name: Push changes
        if: env.committed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        run: |
          git push
          echo "✓ 已推送新内容,将触发 deploy.yml 重新部署"

      - name: Workflow summary
        if: always()
        run: |
          echo "=== Fetch Content Workflow 总结 ==="
          echo "目标日期: ${{ steps.dates.outputs.dates }}"
          echo "抓取状态: ${{ steps.fetch.outcome }}"
          echo "提交状态: ${{ env.committed }}"
