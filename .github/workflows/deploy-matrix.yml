# GitHub Actions 矩阵部署工作流模板（github-pages-部署器专用）
#
# 使用方式：
#   1. 由 scripts/创建工作流.py 自动填充占位符并写入 .github/workflows/deploy-matrix.yml
#   2. 占位符：wangdan197902-art / history / ai-term-hub.com / 0.140.0
#   3. 在仓库 Settings → Secrets 中添加 PERSONAL_GITHUB_TOKEN（由 scripts/配置secrets.py 完成）
#   4. 推送到 main 分支即可触发24语种并行部署
#
# 部署目标：24个独立仓库的 gh-pages 分支
# 自定义域名：history-{lang}.ai-term-hub.com

name: Deploy Multilingual Sites (Matrix)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      days_limit:
        description: '限制生成天数(0=全部366天,30=测试用)'
        required: false
        default: '0'
        type: string

env:
  SITE_TYPE: history
  DOMAIN: ai-term-hub.com
  HUGO_VERSION: '0.140.0'
  GITHUB_USER: wangdan197902-art

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        lang: [ar, cs, da, de, el, en, es, fi, fr, hu, id, it,
               ja, ko, nl, no, pl, pt, ro, ru, sv, tr, vi, zh]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --quiet pydantic pydantic-settings diskcache httpx tenacity

      - name: Generate content for ${{ matrix.lang }}
        run: |
          DAYS_LIMIT="${{ github.event.inputs.days_limit || '0' }}"
          echo "🚀 生成内容: 30地区 × ${DAYS_LIMIT}天 × ${{ matrix.lang }}语种 (0=全量366天)"
          # 注: 移除 `2>&1 | tail -10` 管道(会掩盖真实退出码),让错误可见
          # 注: 先清理 site/content/ 以删除 git 跟踪的旧大写目录(如 zh/CN/),确保仅保留小写生成内容。
          rm -rf site/content/*
          python3 scripts/generate_full_site.py \
            --output-dir=site/content \
            --limit-days=${DAYS_LIMIT} \
            --languages=${{ matrix.lang }}

      - name: Build ${{ matrix.lang }} site
        run: |
          cd site
          hugo --config hugo.toml,hugo-${{ matrix.lang }}.toml \
               --minify \
               --destination ../public-${{ matrix.lang }}
        env:
          HUGO_ENV: production

      - name: Prepare single-lang publish dir
        run: |
          # Hugo 多语种构建：defaultContentLanguage={lang} 时，当前语种内容在根目录
          # 其他语种子目录（/zh/, /en/ 等）需要清除，只保留当前语种内容
          mkdir -p publish-${{ matrix.lang }}
          cp -r public-${{ matrix.lang }}/* publish-${{ matrix.lang }}/

          # 删除其他语种子目录（24 个语种中除当前语种外的 23 个）
          for other_lang in ar cs da de el en es fi fr hu id it ja ko nl no pl pt ro ru sv tr vi zh; do
            if [ "$other_lang" != "${{ matrix.lang }}" ]; then
              rm -rf "publish-${{ matrix.lang }}/$other_lang"
            fi
          done

          # 确保根目录有 index.html
          if [ ! -f "publish-${{ matrix.lang }}/index.html" ]; then
            echo "⚠️  根目录缺少 index.html，检查构建产物..."
            ls -la "publish-${{ matrix.lang }}/" | head -20
          fi

      - name: Fix sitemap for single-lang
        env:
          CURRENT_LANG: ${{ matrix.lang }}
        run: |
          # Hugo 多语种构建生成的 sitemap.xml 包含所有配置语种的 URL，
          # 此步骤过滤掉其他语种的 URL，只保留当前语种（根路径）的 URL。
          # 用环境变量传递 lang，避免 shell 字符串替换的 bug。
          python3 -c '
          import re, os
          from urllib.parse import urlparse
          lang = os.environ["CURRENT_LANG"]
          all_langs = ["ar","cs","da","de","el","en","es","fi","fr","hu","id","it","ja","ko","nl","no","pl","pt","ro","ru","sv","tr","vi","zh"]
          other_langs = set(l for l in all_langs if l != lang)
          root_sitemap = "publish-" + lang + "/sitemap.xml"
          lang_sitemap = "publish-" + lang + "/" + lang + "/sitemap.xml"
          if os.path.exists(lang_sitemap):
              sitemap_path = lang_sitemap
              print("Using lang subdirectory sitemap: " + lang_sitemap)
          elif os.path.exists(root_sitemap):
              sitemap_path = root_sitemap
              print("Using root sitemap: " + root_sitemap)
          else:
              print("Warning: no sitemap.xml found, skipping")
              raise SystemExit(0)
          with open(sitemap_path, "r", encoding="utf-8") as f:
              content = f.read()
          # 提取所有 <url>...</url> 块，保留原始结构（含 lastmod/changefreq/priority）
          blocks = re.findall(r"<url>.*?</url>", content, re.DOTALL)
          valid = []
          for b in blocks:
              m = re.search(r"<loc>([^<]+)</loc>", b)
              if not m:
                  continue
              loc = m.group(1)
              # 解析 URL path，判断第一段是否是其他语种
              path = urlparse(loc).path.strip("/")
              first_segment = path.split("/")[0] if path else ""
              if first_segment in other_langs:
                  continue
              valid.append(b)
          with open(root_sitemap, "w", encoding="utf-8") as f:
              f.write("<?xml version=\"1.0\" encoding=\"utf-8\" standalone=\"yes\"?>\n")
              f.write("<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n")
              for b in valid:
                  f.write(b + "\n")
              f.write("</urlset>\n")
          print("Fixed sitemap: " + str(len(valid)) + " URLs for " + lang + " (source: " + sitemap_path + ")")
          '

      - name: Build Pagefind index
        continue-on-error: true
        run: |
          set -x
          # 安装 Pagefind（使用直接 URL 避免 CloudCannon→Pagefind 仓库迁移重定向）
          curl -fL https://github.com/Pagefind/pagefind/releases/download/v1.5.2/pagefind-v1.5.2-x86_64-unknown-linux-musl.tar.gz \
            -o pagefind.tar.gz
          tar -xzf pagefind.tar.gz
          chmod +x pagefind
          ./pagefind --version

          # 诊断：检查 publish 目录内容
          echo "=== publish-${{ matrix.lang }} 目录内容（前20项）==="
          ls "publish-${{ matrix.lang }}/" | head -20
          echo "=== HTML 文件数量 ==="
          find "publish-${{ matrix.lang }}" -name "*.html" | wc -l
          echo "=== search 目录检查 ==="
          ls "publish-${{ matrix.lang }}/search/" 2>/dev/null || echo "⚠️ search 目录不存在"

          # 为当前语种构建索引（直接对 publish 目录索引，输出 /pagefind/ 子目录）
          ./pagefind --site "publish-${{ matrix.lang }}" \
                     --output-subdir "pagefind"

          echo "✅ Pagefind 索引构建完成"
          ls "publish-${{ matrix.lang }}/pagefind/" 2>/dev/null | head -5 || echo "⚠️ pagefind 目录未生成"

      - name: Add CNAME and .nojekyll
        run: |
          echo "${{ env.SITE_TYPE }}-${{ matrix.lang }}.${{ env.DOMAIN }}" > publish-${{ matrix.lang }}/CNAME
          touch publish-${{ matrix.lang }}/.nojekyll
          # IndexNow API Key 文件（用于 Bing/Yandex 即时索引推送）
          echo "a0f6b5032dd63cf84271ae3ab4fcaf86" > publish-${{ matrix.lang }}/a0f6b5032dd63cf84271ae3ab4fcaf86.txt

      - name: Deploy to ${{ matrix.lang }}.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          external_repository: ${{ env.GITHUB_USER }}/${{ env.SITE_TYPE }}-${{ matrix.lang }}
          publish_branch: gh-pages
          publish_dir: ./publish-${{ matrix.lang }}
          force_orphan: true
          user_name: 'Deploy Agent'
          user_email: 'deploy@ai-term-hub.com'
          commit_message: 'Auto-deploy ${{ matrix.lang }} site (single-lang)'

      - name: Notify deployment
        run: |
          echo "✅ Deployed: https://${{ env.SITE_TYPE }}-${{ matrix.lang }}.${{ env.DOMAIN }}"
          echo "📦 Repository: https://github.com/${{ env.GITHUB_USER }}/${{ env.SITE_TYPE }}-${{ matrix.lang }}"
