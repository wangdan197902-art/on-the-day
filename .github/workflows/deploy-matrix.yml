# GitHub Actions 矩阵部署工作流模板（github-pages-部署器专用）
#
# 使用方式：
#   1. 由 scripts/创建工作流.py 自动填充占位符并写入 .github/workflows/deploy-matrix.yml
#   2. 占位符：wangdan197902-art / history / ai-term-hub.com / 0.140.0
#   3. 在仓库 Settings → Secrets 中添加 PERSONAL_GITHUB_TOKEN（由 scripts/配置secrets.py 完成）
#   4. 推送到 main 分支即可触发25语种并行部署
#
# 部署目标：25个独立仓库的 gh-pages 分支
# 自定义域名：{lang}.{site_type}.{domain}

name: Deploy Multilingual Sites (Matrix)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      days_limit:
        description: '限制生成天数(0=全部366天,30=测试用)'
        required: false
        default: '30'
        type: string

env:
  SITE_TYPE: history
  DOMAIN: ai-term-hub.com
  HUGO_VERSION: '0.140.0'
  GITHUB_USER: wangdan197902-art

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        lang: [ar, cs, da, de, el, en, es, fi, fr, hu, id, it,
               ja, ko, nl, no, pl, pt, ro, ru, sv, th, tr, vi, zh]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --quiet pydantic pydantic-settings diskcache httpx tenacity

      - name: Generate content for ${{ matrix.lang }}
        run: |
          DAYS_LIMIT="${{ github.event.inputs.days_limit || '30' }}"
          echo "🚀 生成内容: 30地区 × ${DAYS_LIMIT}天 × ${{ matrix.lang }}语种"
          python3 scripts/generate_full_site.py \
            --output-dir=site/content \
            --limit-days=${DAYS_LIMIT} \
            --languages=${{ matrix.lang }} 2>&1 | tail -10

      - name: Build ${{ matrix.lang }} site
        run: |
          cd site
          hugo --config hugo.toml,hugo-${{ matrix.lang }}.toml \
               --minify \
               --destination ../public-${{ matrix.lang }}
        env:
          HUGO_ENV: production

      - name: Prepare single-lang publish dir
        run: |
          # Hugo 多语种构建：defaultContentLanguage={lang} 时，当前语种内容在根目录
          # 其他语种子目录（/zh/, /en/ 等）需要清除，只保留当前语种内容
          mkdir -p publish-${{ matrix.lang }}
          cp -r public-${{ matrix.lang }}/* publish-${{ matrix.lang }}/

          # 删除其他语种子目录（25 个语种中除当前语种外的 24 个）
          for other_lang in ar cs da de el en es fi fr hu id it ja ko nl no pl pt ro ru sv th tr vi zh; do
            if [ "$other_lang" != "${{ matrix.lang }}" ]; then
              rm -rf "publish-${{ matrix.lang }}/$other_lang"
            fi
          done

          # 确保根目录有 index.html
          if [ ! -f "publish-${{ matrix.lang }}/index.html" ]; then
            echo "⚠️  根目录缺少 index.html，检查构建产物..."
            ls -la "publish-${{ matrix.lang }}/" | head -20
          fi

      - name: Add CNAME and .nojekyll
        run: |
          echo "${{ matrix.lang }}.${{ env.SITE_TYPE }}.${{ env.DOMAIN }}" > publish-${{ matrix.lang }}/CNAME
          touch publish-${{ matrix.lang }}/.nojekyll
          # IndexNow API Key 文件（用于 Bing/Yandex 即时索引推送）
          echo "a0f6b5032dd63cf84271ae3ab4fcaf86" > publish-${{ matrix.lang }}/a0f6b5032dd63cf84271ae3ab4fcaf86.txt

      - name: Deploy to ${{ matrix.lang }}.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          external_repository: ${{ env.GITHUB_USER }}/${{ env.SITE_TYPE }}-${{ matrix.lang }}
          publish_branch: gh-pages
          publish_dir: ./publish-${{ matrix.lang }}
          force_orphan: true
          user_name: 'Deploy Agent'
          user_email: 'deploy@ai-term-hub.com'
          commit_message: 'Auto-deploy ${{ matrix.lang }} site (single-lang)'

      - name: Notify deployment
        run: |
          echo "✅ Deployed: https://${{ matrix.lang }}.${{ env.SITE_TYPE }}.${{ env.DOMAIN }}"
          echo "📦 Repository: https://github.com/${{ env.GITHUB_USER }}/${{ env.SITE_TYPE }}-${{ matrix.lang }}"
