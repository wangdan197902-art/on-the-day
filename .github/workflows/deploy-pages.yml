name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.0'
          extended: true
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python dependencies
        run: pip install --quiet pydantic pydantic-settings diskcache httpx tenacity
        continue-on-error: true
      - name: Generate site content
        run: python3 scripts/generate_full_site.py --output-dir=site/content --limit-days=5 2>&1 | tail -10
        continue-on-error: true
      - name: Build with Hugo
        run: cd site && hugo --minify --baseURL "https://history.ai-term-hub.com/"
        env:
          HUGO_ENV: production
      - name: Build Pagefind Search Index
        run: cd site && npx pagefind --site public/
        continue-on-error: true
      - name: Add .nojekyll
        run: touch site/public/.nojekyll
      - name: Ensure index.html
        run: |
          if [ ! -f site/public/index.html ]; then
            mkdir -p site/public
            cat > site/public/index.html << 'HTMLEOF'
          <!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>On This Day - AI History</title></head><body><h1>On This Day - AI History</h1><p>Site is being deployed. Please wait a moment...</p></body></html>
          HTMLEOF
          fi
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
