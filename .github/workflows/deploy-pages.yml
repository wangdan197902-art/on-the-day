name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.0'
          extended: true
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python dependencies
        run: pip install --quiet pydantic pydantic-settings diskcache httpx tenacity
        continue-on-error: true
      - name: Generate site content
        run: python3 scripts/generate_full_site.py --output-dir=site/content --limit-days=5 2>&1 | tail -10
        continue-on-error: true
      - name: Merge root static/ into site/static/
        run: |
          if [ -d static ]; then
            mkdir -p site/static
            cp -r static/* site/static/ 2>/dev/null || true
            echo "Merged root static/ into site/static/:"
            ls -la site/static/
          else
            echo "No root static/ directory found"
          fi
      - name: Build with Hugo
        run: cd site && hugo --minify --baseURL "https://history.ai-term-hub.com/"
        env:
          HUGO_ENV: production
      - name: Build Pagefind Search Index
        run: cd site && npx pagefind --site public/
        continue-on-error: true
      - name: Add .nojekyll
        run: touch site/public/.nojekyll
      - name: Inject GA4 + ensure SEO on root index.html
        run: |
          # 主入口根目录 index.html 由 Hugo 多语言重定向生成，不走 seo.html partial
          # 强制注入 GA4 跟踪代码到根目录 index.html 的 </head> 之前
          GA4_TAG='<script async src="https://www.googletagmanager.com/gtag/js?id=G-15279420781"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag("js",new Date());gtag("config","G-15279420781");</script>'
          if [ -f site/public/index.html ]; then
            if ! grep -q "G-15279420781" site/public/index.html; then
              python3 -c "
          import re, sys
          p = 'site/public/index.html'
          with open(p, 'r', encoding='utf-8') as f:
              html = f.read()
          ga4 = '''<script async src=\"https://www.googletagmanager.com/gtag/js?id=G-15279420781\"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-15279420781');</script>'''
          if 'G-15279420781' not in html:
              html = re.sub(r'</head>', ga4 + r'</head>', html, count=1)
              with open(p, 'w', encoding='utf-8') as f:
                  f.write(html)
              print('✓ Injected GA4 into root index.html')
          else:
              print('✓ Root index.html already has GA4')
          "
            else
              echo "✓ Root index.html already has GA4"
            fi
          fi
      - name: Ensure index.html
        run: |
          if [ ! -f site/public/index.html ]; then
            mkdir -p site/public
            cat > site/public/index.html << 'HTMLEOF'
          <!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>On This Day - AI History</title></head><body><h1>On This Day - AI History</h1><p>Site is being deployed. Please wait a moment...</p></body></html>
          HTMLEOF
          fi
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
